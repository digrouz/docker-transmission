## @section Kubernetes settings
##
image:
  ## @param image.registry transmission image registry
  ##
  registry: docker.io
  ## @param image.repository transmission image repository
  ##
  repository: digrouz/transmission
  ##
  ## @param image.tag transmission image tag
  ## Ref: https://hub.docker.com/r/digrouz/transmission/tags
  ##
  tag: "latest"
  ## @param image.pullPolicy transmission image pull policy
  ## ref: https://kubernetes.io/docs/user-guide/images/#pre-pulling-images
  ##
  pullPolicy: Always
## @param fullnameOverride String to override the application name.
##
fullnameOverride: ""
## @section Service Configuration
##
service:
  ## @param service.uid user id running transmission
  ##
  uid: 12345
  ## @param service.gid group id running transmission
  ##
  gid: 12345
  ## @param service.autoupgrade apply OS updates inside container at startup
  ##
  autoupgrade: 0
  ## @param service.tz Time Zone
  ##
  tz: Europe/Brussels
  ## @param service.notiftype Notification type
  ## Example: mail, telegram
  ##
  notiftype: "mail"
  ## @param service.umask Umask for created files and directories
  ## Example: 002, 022
  ##
  umask: "002"
  ## @param service.blocklistenabled Enable or disable blocklist
  ## Example: "true", "false"
  ##
  blocklistenabled: "false"
  ## @param service.blocklisturl URL for blocklist
  ## Example: "http://list.iblocklist.org/?list=bt_level1&fileformat=p2p&archiveformat=gz"
  ##
  blocklisturl: "http://list.iblocklist.org/?list=bt_level1&fileformat=p2p&archiveformat=gz"
  ## @param service.rpcenabled Enable or disable RPC
  ## Example: "true", "false"
  ##
  rpcenabled: "true"
  ## @param service.rpcbindaddress RPC bind address
  ## Example: "0.0.0.0"
  ##
  rpcbindaddress: "0.0.0.0"
  ## @param service.rpcauthenticationrequired Enable or disable RPC authentication
  ## Example: "true", "false"
  ##
  rpcauthenticationrequired: "true"
  ## @param service.rpcusername RPC username for transmission
  ## Example: transmission
  ##
  rpcusername: "transmission"
  ## @param service.rpcpassword RPC password for transmission
  ## Example: transmission
  ##
  rpcpassword: "transmission"
  ## @param service.rpcport RPC port for transmission
  ## Example: 9092
  ##
  rpcport: 9092
  ## @param service.rpcwhitelistenabled Enable or disable RPC whitelist
  ## Example: "true", "false"
  ##
  rpcwhitelistenabled: "true"
  ## @param service.rpcwhitelist RPC whitelist for transmission
  ## Example: "127.0.0.1,::1"
  rpcwhitelist: "127.0.0.1,::1"
  ## @param service.rpchostwhitelistenabled Enable or disable RPC whitelist allowed
  ## Example: "true", "false"
  ##
  rpchostwhitelistenabled: "false"
  ## @param service.rpchostwhitelist RPC whitelist allowed for transmission
  ## Example: ""
  rpchostwhitelist: ""
  ## @param service.lpdEnabled Enable or disable lpd
  ## Example: "true", "false"
  ##
  lpdEnabled: "false"
  ## @param service.antiBruteForceEnabled Enable or disable anti-brute-force
  ## Example: "true", "false"
  ##
  antiBruteForceEnabled: "false"
  ## @param service.antiBruteForceThreshold Anti-brute-force threshold
  ## Example: 100
  ##
  antiBruteForceThreshold: 100
  ## @param service.speedLimitDownEnabled Enable or disable speed limit down
  ## Example: "true", "false"
  ##
  speedLimitDownEnabled: "false"
  ## @param service.speedLimitDown Speed limit down
  ## Example: 100
  ##
  speedLimitDown: 100
  ## @param service.speedLimitUpEnabled Enable or disable speed limit up
  ## Example: "true", "false"
  ##
  speedLimitUpEnabled: "false"
  ## @param service.speedLimitUp Speed limit up
  ## Example: 100
  ##
  speedLimitUp: 100
  ## @param service.altSpeedEnabled Enable or disable alt speed
  ## Example: "true", "false"
  ##
  altSpeedEnabled: "false"
  ## @param service.altSpeedDown Alt speed down
  ## Example: 50
  ##
  altSpeedDown: 50
  ## @param service.altSpeedUp Alt speed up
  ## Example: 50
  ##
  altSpeedUp: 50
  ## @param service.altSpeedTimeEnabled Enable or disable alt speed time
  ## Example: "true", "false"
  ##
  altSpeedTimeEnabled: "false"
  ## @param service.altSpeedTimeBegin Alt speed time begin (in minutes from midnight)
  ## Example: 540
  ##
  altSpeedTimeBegin: 0
  ## @param service.altSpeedTimeEnd Alt speed time end (in minutes from midnight)
  ## Example: 1020
  ##
  altSpeedTimeEnd: 0
  ## @param service.altSpeedTimeDay Alt speed time day (bitmask: 1=Sun, 2=Mon, 4=Tue, 8=Wed, 16=Thu, 32=Fri, 64=Sat)
  ## Example: 127 (all days), 62 (weekdays)
  ##
  altSpeedTimeDay: 127
  ## @param service.peerLimitGlobal Global peer limit
  ## Example: 200
  ##
  peerLimitGlobal: 200
  ## @param service.peerLimitPerTorrent Per torrent peer limit
  ## Example: 50
  ##
  peerLimitPerTorrent: 50
  ## @param service.ratioLimit Ratio limit
  ## Example: 2
  ##
  ratioLimit: 2
  ## @param service.ratioLimitEnabled Enable or disable ratio limit
  ## Example: "true", "false"
  ##
  ratioLimitEnabled: "false"
  ## @param service.idleSeedingLimit Idle seeding limit
  ## Example: 30
  ##
  idleSeedingLimit: 30
  ## @param service.idleSeedingLimitEnabled Enable or disable idle seeding limit
  ## Example: "true", "false"
  ##
  idleSeedingLimitEnabled: "false"
  ## @param service.queueStalledMinutes Queue stalled minutes
  ## Example: 30
  ##
  queueStalledMinutes: 30
  ## @param service.queueStalledEnabled Enable or disable queue stalled
  ## Example: "true", "false"
  ##
  queueStalledEnabled: "true"
## @section SMTP Configuration
##
smtp:
  ## @param smtp.host SMTP host
  ##
  host: ""
  ## @param smtp.to SMTP recipient email address
  ## Example: foo.bar@domain.com
  ##
  to: ""
  ## @param smtp.domain SMTP sender email address
  ## Example: domain.com
  ##
  domain: ""
## @section Ingress Configuration
##
ingress:
  ## @param ingress.webui.ingressClassName Ingress class name for transmission ingress
  ##
  ingressClassName: traefik
  ## @param Ingress configuration for transmission webui
  ##
  webui:
    ## @param ingress.webui.enabled Enable ingress for transmission webui
    ##
    enabled: true
    ## @param ingress.webui.host Host for transmission webui ingress
    ##
    host: ""
    ## @param ingress.webui.tls Enable TLS for transmission webui ingress
    ##
    tls: true
    ## @param ingress.webui.annotations Annotations for transmission webui ingress
    ##
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: [] 
      cert-manager.io/cluster-issuer: letsencrypt-prod
  ## @param Ingress configuration for transmission DHT UDP ingress
  ##
  dht:
    ## @param ingress.dht.enabled Enable ingress for transmission DHT UDP
    ##
    enabled: false
    ## @param ingress.dht.traefik.entrypoint Traefik entrypoint for transmission DHT UDP ingress
    ##
    traefik:
      entrypoint: udp-dht
    ## @param ingress.dht.weight Weight for transmission DHT UDP ingress
    ##
    weight: 10
  ## @param Ingress configuration for transmission API TCP ingress
  ##
  api:
    ## @param ingress.api.enabled Enable ingress for transmission API TCP
    ##
    enabled: false
    ## @param ingress.api.traefik.entrypoint Traefik entrypoint for transmission API TCP ingress
    ##
    traefik:
      entrypoint: tcp-api
    ## @param ingress.api.weight Weight for transmission API TCP ingress
    ##
    weight: 10
## @section Storage persistence Configuration
##
persistence:
  config:
    ## @param persistence.config.type Type of persistence for transmission config
    ## If set to pvc, a persistent volume claim will be created
    ## If set to nfs, a network file system will be used
    ##
    type: pvc
    ## Specific persistence options for transmission config using a persistent volume claim
    ##
    pvc:
      ## @param persistence.config.pvc.storageClass Storage class for transmission config
      ## If not set, the default storage class will be used
      ##
      storageClass: longhorn
      ## @param persistence.config.pvc.existingClaim Existing persistent volume claim for transmission config
      ## If set, the config will be stored in the existing persistent volume claim
      ##
      accessMode: ReadWriteOnce
      ## @param persistence.config.pvc.size Size of the persistent volume for transmission config
      ## If not set, the default size will be used
      ##
      size: 5Gi
    ## Specific persistence options for transmission config using NFS
    ##      
    nfs:
      ## @param persistence.config.nfs.server NFS server for transmission config
      ## If not set, the default NFS server will be used
      ##
      server: ""
      ## @param persistence.config.nfs.path NFS path for transmission config
      ## If not set, the default NFS path will be used
      ##
      path: ""
  downloads:
    ## @param persistence.downloads.type Type of persistence for transmission downloads
    ## If set to pvc, a persistent volume claim will be created
    ## If set to nfs, a network file system will be used
    ##
    type: pvc
    ## Specific persistence options for transmission downloads using a persistent volume claim
    ##
    pvc:
      ## @param persistence.downloads.pvc.storageClass Storage class for transmission downloads
      ## If not set, the default storage class will be used
      ##
      storageClass: longhorn
      ## @param persistence.downloads.pvc.accessMode Access mode for transmission downloads
      ## If not set, the default access mode will be used
      ##
      accessMode: ReadWriteOnce
      ## @param persistence.downloads.pvc.size Size of the persistent volume for transmission downloads
      ## If not set, the default size will be used
      ##
      size: 5Gi
    ## Specific persistence options for transmission downloads using NFS
    ##      
    nfs:
      ## @param persistence.downloads.nfs.server NFS server for transmission downloads
      ## If not set, the default NFS server will be used
      ##
      server: ""
      ## @param persistence.downloads.nfs.path NFS path for transmission downloads
      ## If not set, the default NFS path will be used
      ##
      path: ""
  watch:
    ## @param persistence.watch.type Type of persistence for transmission watch
    ## If set to pvc, a persistent volume claim will be created
    ## If set to nfs, a network file system will be used
    ##
    type: pvc
    ## Specific persistence options for transmission watch using a persistent volume claim
    ##
    pvc:
      ## @param persistence.watch.pvc.storageClass Storage class for transmission watch
      ## If not set, the default storage class will be used
      ##
      storageClass: longhorn
      ## @param persistence.watch.pvc.accessMode Access mode for transmission watch
      ## If not set, the default access mode will be used
      ##
      accessMode: ReadWriteOnce
      ## @param persistence.watch.pvc.size Size of the persistent volume for transmission watch
      ## If not set, the default size will be used
      ##
      size: 5Gi
    ## Specific persistence options for transmission watch using NFS
    ##      
    nfs:
      ## @param persistence.watch.nfs.server NFS server for transmission watch
      ## If not set, the default NFS server will be used
      ##
      server: ""
      ## @param persistence.watch.nfs.path NFS path for transmission watch
      ## If not set, the default NFS path will be used
      ##
      path: ""
  ## Extra volumes to be mounted into the Pod
  ## Example:
  ## extraVolumes:
  ##   - name: my-config
  ##     configMap:
  ##       name: my-configmap
  extraVolumes: []
  ## Extra volumeMounts to add to the transmission container
  ## Example:
  ## extraVolumeMounts:
  ##   - name: my-config
  ##     mountPath: /etc/my-config
  extraVolumeMounts: []
extraObjects: []



